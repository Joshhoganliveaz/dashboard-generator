name = "dashboard-generator"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Staging environment — same code, separate worker URL
# Deploy with: npm run deploy:staging
# URL: https://dashboard-generator-staging.josh-hogan-account.workers.dev
[env.staging]
name = "dashboard-generator-staging"

[env.staging.assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Dev/preview environment — for testing frontend changes
# Deploy with: npm run deploy:dev
# URL: https://dashboard-generator-dev.josh-hogan-account.workers.dev
[env.dev]
name = "dashboard-generator-dev"

[env.dev.assets]
directory = ".open-next/assets"
binding = "ASSETS"
