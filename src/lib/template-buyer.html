<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title id="pageTitle">Your Buyer Dashboard | Live AZ Co</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--sand:#D4A574;--sand-light:#E8CDB0;--sand-pale:#F5EDE3;
--terra:#C2703E;--terra-light:#D4915F;--terra-dark:#A85A2A;
--sage:#7A8B6F;--sage-dark:#5C6B52;--sage-light:#9AAD8E;
--slate:#3D3D3D;--slate-light:#5A5A5A;
--cream:#FAF6F0;
--positive:#5C8A4D;--negative:#B84C3A;--neutral:#8B7355;
--card:#fff;--border:#E8DDD0;
--sage-bg:rgba(122,139,111,.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--slate);-webkit-font-smoothing:antialiased}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--sand-pale);outline:none;margin:6px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--terra);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--terra);cursor:pointer;border:2px solid #fff}
input[type=number]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:14px;font-weight:700;color:var(--slate);background:var(--card);outline:none}
input[type=number]:focus{border-color:var(--terra)}
select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:14px;font-weight:700;color:var(--slate);background:var(--card);outline:none;cursor:pointer}
select:focus{border-color:var(--terra)}
.header{background:linear-gradient(135deg,var(--slate),var(--slate-light));padding:16px 20px;color:#fff}
.header-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.header-text{flex:1;min-width:0}
.header-logo{height:72px;width:auto;opacity:.9;flex-shrink:0;margin-left:-12px}
.header-title{font-size:18px;font-weight:700;font-family:'Playfair Display',serif;line-height:1.2;opacity:.85}
.header-names{font-size:28px;font-weight:900;font-family:'Playfair Display',serif;margin-top:4px}
.tab-bar-wrap{position:sticky;top:0;z-index:100;background:var(--card)}
.tab-bar{display:flex;border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1 0 0;padding:14px 8px;text-align:center;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:var(--slate-light);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;white-space:nowrap}
.tab-btn.active{color:var(--terra);border-bottom-color:var(--terra);background:var(--sand-pale)}
.tab-btn:hover:not(.active){background:rgba(0,0,0,.02)}
.tab-panel{display:none;max-width:1400px;margin:0 auto;padding:12px}
.tab-panel.active{display:block}
.metrics{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:10px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-label{font-size:10px;font-weight:600;color:var(--slate-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:800;line-height:1.1}
.metric-sub{font-size:11px;color:var(--neutral);margin-top:4px}
.layout{display:flex;flex-direction:column;gap:14px}
.sidebar{width:100%}.main{width:100%}
.section{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.section-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.section-header:hover{background:var(--sand-pale)}
.section-title{font-size:14px;font-weight:700;color:var(--slate)}
.section-arrow{font-size:12px;color:var(--neutral);transition:transform .2s}
.section-body{padding:0 16px 16px;display:none}
.section.open .section-body{display:block}
.section.open .section-arrow{transform:rotate(180deg)}
.field{margin-bottom:12px}
.field-label{font-size:11px;font-weight:600;color:var(--slate-light);margin-bottom:4px;display:flex;justify-content:space-between}
.field-value{font-size:13px;font-weight:700;color:var(--terra)}
.info-box{background:var(--sand-pale);border-radius:6px;padding:10px 12px;text-align:center;margin-bottom:10px}
.info-box .big{font-size:20px;font-weight:800;color:var(--terra)}
.info-box .note{font-size:10px;color:var(--neutral);font-style:italic;margin-top:2px}
.toggle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.toggle-label{font-size:13px;font-weight:600;color:var(--slate)}
.toggle{position:relative;width:44px;height:24px;background:var(--sand-pale);border-radius:12px;cursor:pointer;transition:.2s;border:1px solid var(--border)}
.toggle.on{background:var(--sage)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:22px}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--sand-pale)}
.summary-label{font-size:13px;color:var(--slate-light)}
.summary-value{font-size:14px;font-weight:700}
.summary-total{display:flex;justify-content:space-between;padding:10px 12px;border-radius:8px;margin-top:6px}
.callout{border-radius:8px;padding:12px;margin-bottom:12px}
.callout.amber{background:rgba(212,168,71,.08);border:1px solid rgba(212,168,71,.2)}
.callout.green{background:rgba(92,138,77,.06);border:1px solid rgba(92,138,77,.15)}
.callout.blue{background:rgba(61,61,61,.04);border:1px solid rgba(61,61,61,.12)}
.callout-title{font-weight:700;font-size:12px;color:var(--slate);margin-bottom:4px}
.callout-text{font-size:12px;color:var(--neutral);line-height:1.6}
.email-btn{display:inline-block;background:var(--terra);color:#fff;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;font-family:inherit;border:none;cursor:pointer}
.email-btn:hover{background:var(--terra-dark)}
.review-card{background:var(--sand-pale);border-radius:10px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.review-text{font-size:13px;color:var(--slate);line-height:1.6;font-style:italic}
.review-author{font-size:11px;font-weight:700;color:var(--neutral);margin-top:8px}
.team-stat{text-align:center;padding:16px 10px}
.team-stat-val{font-size:28px;font-weight:900;font-family:'Playfair Display',serif;color:var(--terra)}
.team-stat-lbl{font-size:11px;font-weight:600;color:var(--slate-light);margin-top:2px}
.footer{text-align:center;font-size:11px;color:var(--neutral);line-height:1.5;margin-top:20px;padding:20px}
.footer-logo{height:32px;width:auto;opacity:.7;margin-bottom:8px}
.nhood-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.nhood-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.nhood-badge.sage{background:rgba(122,139,111,.15);color:var(--sage-dark)}
.nhood-badge.terra{background:rgba(194,112,62,.12);color:var(--terra-dark)}
.nhood-badge.sand{background:rgba(212,165,116,.15);color:var(--neutral)}
.nhood-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.nhood-stat{text-align:center;background:var(--sand-pale);border-radius:6px;padding:8px 4px}
.nhood-stat-label{font-size:9px;font-weight:600;color:var(--slate-light);text-transform:uppercase;letter-spacing:.3px}
.nhood-stat-value{font-size:12px;font-weight:700;color:var(--slate);margin-top:2px}
.why-box{background:var(--sage-bg);border-left:3px solid var(--sage);border-radius:0 8px 8px 0;padding:12px 14px;margin-top:12px}
.why-box-title{font-size:11px;font-weight:700;color:var(--sage-dark);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.why-box-text{font-size:12px;color:var(--neutral);line-height:1.6}
.school-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.school-badge{font-size:14px;font-weight:900;color:#fff;background:var(--sage);border-radius:6px;padding:6px 10px;flex-shrink:0;text-align:center;min-width:44px}
.school-info{flex:1}
.school-name{font-size:13px;font-weight:700;color:var(--terra)}
.school-name a{color:var(--terra);text-decoration:none}
.school-name a:hover{text-decoration:underline}
.school-meta{font-size:11px;color:var(--slate-light);margin-top:2px}
.school-desc{font-size:12px;color:var(--neutral);margin-top:4px;line-height:1.5}
.timeline-phase{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;border-left:4px solid var(--sage)}
.timeline-phase.phase-1{border-left-color:var(--sage)}
.timeline-phase.phase-2{border-left-color:var(--terra)}
.timeline-phase.phase-3{border-left-color:var(--sand)}
.timeline-phase.phase-4{border-left-color:var(--slate)}
.timeline-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.timeline-label.sage{color:var(--sage-dark)}
.timeline-label.terra{color:var(--terra)}
.timeline-label.sand{color:var(--neutral)}
.timeline-label.slate{color:var(--slate)}
.timeline-title{font-size:16px;font-weight:800;font-family:'Playfair Display',serif;color:var(--slate);margin-bottom:8px}
.timeline-items{list-style:none;padding:0}
.timeline-items li{font-size:13px;color:var(--neutral);padding:4px 0;padding-left:16px;position:relative;line-height:1.5}
.timeline-items li::before{content:'';position:absolute;left:0;top:10px;width:6px;height:6px;border-radius:50%;background:var(--sand)}
.market-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
@media(min-width:768px){
  .header-names{font-size:32px}
  .metrics{grid-template-columns:repeat(3,1fr)}
  .layout{flex-direction:row}
  .sidebar{width:380px;flex-shrink:0}
  .main{flex:1;min-width:0}
  .tab-btn{font-size:13px;padding:14px 16px}
  .market-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:600px){
  .tab-btn{font-size:11px;padding:12px 6px}
  .nhood-stats{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header"><div class="header-inner">
  <div class="header-text">
    <div class="header-title" id="headerTitle"></div>
    <div class="header-names" id="headerNames"></div>
    <div id="headerSub" style="font-size:11px;opacity:.6;margin-top:4px"></div>
  </div>
</div></div>

<div class="tab-bar-wrap">
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('search')">🏠 Home Search</button>
  <button class="tab-btn" onclick="showTab('neighborhoods')">📍 Neighborhoods &amp; Schools</button>
  <button class="tab-btn" onclick="showTab('timeline')">📅 Timeline</button>
  <button class="tab-btn" onclick="showTab('team')">🤝 Team</button>
</div>
</div>

<div class="tab-panel active" id="tab-search"></div>
<div class="tab-panel" id="tab-neighborhoods"></div>
<div class="tab-panel" id="tab-timeline"></div>
<div class="tab-panel" id="tab-team"></div>

<div class="footer">
  <div style="font-weight:600;color:var(--terra)">Live AZ Co &bull; Powered by Real Broker</div>
  <div id="footerAgent"></div>
  <div style="margin-top:4px;font-style:italic">Estimates for planning purposes only. Verify all figures with your lender.</div>
</div>

<script>
// === UTILITY FUNCTIONS ===
function showTab(id){
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
  event.target.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
function toggleSection(key){S['sec_'+key]=!S['sec_'+key];render();}
function fmt(n){if(n==null||isNaN(n))return"$0";var a=Math.abs(Math.round(n));var s=a.toLocaleString("en-US");return n<0?"-$"+s:"$"+s}
function fmtK(n){return"$"+Math.round(n/1000)+"k"}
function fmtPct(n){return(n*100).toFixed(1)+"%"}
function section(sKey,title,bodyHtml,titleStyle){
  var isOpen=S['sec_'+sKey];
  var tStyle=titleStyle?' style="'+titleStyle+'"':'';
  return '<div class="section'+(isOpen?' open':'')+'"><div class="section-header" onclick="toggleSection(\''+sKey+'\')"><span class="section-title"'+tStyle+'>'+title+'</span><span class="section-arrow">&#9660;</span></div><div class="section-body">'+bodyHtml+'</div></div>';
}
function slider(label,key,min,max,step,prefix,suffix){
  return '<div class="field"><div class="field-label"><span>'+label+'</span><span class="field-value">'+(prefix||'')+S[key].toLocaleString()+(suffix||'')+'</span></div><input type="range" min="'+min+'" max="'+max+'" step="'+(step||1)+'" value="'+S[key]+'" oninput="S.'+key+'=Number(this.value);render()"></div>';
}
function numInput(label,key,min,max,note){
  return '<div class="field"><div class="field-label">'+label+'</div><input type="number" value="'+S[key]+'" min="'+min+'" max="'+max+'" onchange="S.'+key+'=Number(this.value);render()">'+(note?'<div style="font-size:10px;color:var(--neutral);font-style:italic;margin-top:2px">'+note+'</div>':'')+'</div>';
}
function toggle(label,key){
  return '<div class="toggle-row"><span class="toggle-label">'+label+'</span><div class="toggle '+(S[key]?'on':'')+'" onclick="S.'+key+'=!S.'+key+';render()"></div></div>';
}

// === AGENT PROFILES ===
var AGENTS = {
  josh_jacqui: {
    displayName: "Josh Hogan & Jacqui Shoffner",
    reviewUrl: "https://www.google.com/search?q=live+az+co#lrd=0x872b0778e90dca0f:0x74dc2d1de681e808,1",
    members: [
      { name: "Josh Hogan", initials: "JH", photo: "", gradient: "linear-gradient(135deg, #C2703E, #D4915F)", email: "josh@liveazco.com", phone: "(480) 369-8280" },
      { name: "Jacqui Shoffner", initials: "JS", photo: "", gradient: "linear-gradient(135deg, #7A8B6F, #9AAD8E)", email: "jacqui@liveazco.com", phone: "(602) 751-1615" }
    ],
    reviews: [
      { text: "Josh and Jacqui found us our dream home in Gilbert. Their neighborhood knowledge is unmatched!", author: "Sarah & Mike T." },
      { text: "The custom buyer dashboard they created helped us compare neighborhoods and understand our options. Truly above and beyond!", author: "David & Lisa R." }
    ]
  },
  josh: {
    displayName: "Josh Hogan",
    reviewUrl: "https://www.google.com/search?q=live+az+co#lrd=0x872b0778e90dca0f:0x74dc2d1de681e808,1",
    members: [{ name: "Josh Hogan", initials: "JH", photo: "", gradient: "linear-gradient(135deg, #C2703E, #D4915F)", email: "josh@liveazco.com", phone: "(480) 369-8280" }],
    reviews: [{ text: "Josh's data-driven approach helped us find the perfect home at the right price.", author: "The Martinez Family" }]
  },
  jacqui: {
    displayName: "Jacqui Shoffner",
    reviewUrl: "https://www.google.com/search?q=live+az+co#lrd=0x872b0778e90dca0f:0x74dc2d1de681e808,1",
    members: [{ name: "Jacqui Shoffner", initials: "JS", photo: "", gradient: "linear-gradient(135deg, #7A8B6F, #9AAD8E)", email: "jacqui@liveazco.com", phone: "(602) 751-1615" }],
    reviews: [{ text: "Jacqui was incredible throughout our home buying journey!", author: "Jennifer & Mark W." }]
  },
  robyn: {
    displayName: "Robyn Hoogenraad",
    reviewUrl: "https://www.google.com/search?q=live+az+co#lrd=0x872b0778e90dca0f:0x74dc2d1de681e808,1",
    members: [{ name: "Robyn Hoogenraad", initials: "RH", photo: "", gradient: "linear-gradient(135deg, #8B7355, #A68B6B)", email: "robyn@liveazco.com", phone: "(480) 555-0100" }],
    reviews: [{ text: "Robyn helped us navigate the buying process with confidence.", author: "The Thompson Family" }]
  }
};

// ============================================================
// === CONFIG — The only section that changes per client ===
// ============================================================
var CONFIG = {
  templateType: "buyer",
  clientNames: "Eric & Kellie",
  fullName: "Eric & Kellie Johnson",
  email: "eric@email.com",
  agentKey: "josh_jacqui",
  targetAreas: "Gilbert, Chandler, Queen Creek",
  budgetMin: 550000,
  budgetMax: 750000,
  bedsMin: 4,
  bathsMin: 3,
  mustHaves: ["Pool", "Single Story", "3-Car Garage"],
  schoolPreference: "Gilbert Public Schools",
  neighborhoods: [
    {
      name: "Finley Farms",
      badge: "Top Pick",
      badgeColor: "sage",
      priceRange: "$600K-$800K",
      homeSize: "2,200-3,500 SF",
      commuteTime: "25 min to Tempe",
      description: "Master-planned community in Gilbert with resort-style amenities, community pool, and walking trails.",
      whyItWorks: "Matches your budget and has excellent Gilbert Public Schools zoning."
    }
  ],
  schoolDistricts: [
    {
      name: "Gilbert Public Schools",
      description: "One of the highest-rated districts in Arizona",
      schools: [
        { name: "Greenfield Elementary", badge: "A+", type: "Elementary", grades: "K-6", rating: "9/10", description: "Top-rated elementary with STEM focus", url: "https://www.gilbertschools.net" }
      ]
    }
  ],
  timeline: [
    { phase: "Phase 1", title: "Get Ready (Now)", items: ["Get pre-approved", "Define priorities"] },
    { phase: "Phase 2", title: "Search & Tour", items: ["Tour neighborhoods", "Open houses"] },
    { phase: "Phase 3", title: "Make Your Move", items: ["Write offer", "Inspection"] },
    { phase: "Phase 4", title: "Close & Move In", items: ["Final walkthrough", "Get keys!"] }
  ],
  marketSnapshot: [
    { label: "Gilbert Median Price", value: "$585,000" },
    { label: "Avg Days on Market", value: "32 days" },
    { label: "Inventory", value: "2.8 months" }
  ]
};
// ============================================================
// === END CONFIG ===
// ============================================================

// === BACKWARD-COMPATIBLE ALIASES ===
var AGENT_KEY = CONFIG.agentKey;

// === CALCULATIONS ===
var CONFORMING_LIMIT = 832750;

function pmt(rate, nper, pv) {
  if (rate === 0) return Math.round(pv / nper);
  var r = rate;
  return Math.round(pv * r * Math.pow(1 + r, nper) / (Math.pow(1 + r, nper) - 1));
}

function calc() {
  var dp = Math.round(S.purchasePrice * (S.downPaymentPct / 100));
  var loan = Math.max(0, S.purchasePrice - dp);
  var mo = loan > 0 ? pmt(S.mortgageRate / 100 / 12, 360, loan) : 0;
  var moTax = Math.round(S.purchasePrice * (S.taxRate / 100) / 12);
  var closingCosts = Math.round(S.purchasePrice * 0.025);
  var upgradeCost = (S.kitchenEnabled ? S.kitchenCost : 0) + (S.flooringEnabled ? S.flooringCost : 0) + (S.paintEnabled ? S.paintCost : 0) + (S.landscapeEnabled ? S.landscapeCost : 0);
  var cashToClose = dp + closingCosts;
  var totalCashNeeded = cashToClose + upgradeCost;
  var isJumbo = loan > CONFORMING_LIMIT;
  var needsPMI = S.downPaymentPct < 20;
  return { dp: dp, loan: loan, mo: mo, moTax: moTax, closingCosts: closingCosts, upgradeCost: upgradeCost, cashToClose: cashToClose, totalCashNeeded: totalCashNeeded, isJumbo: isJumbo, needsPMI: needsPMI, monthlyTotal: mo + moTax };
}

// === MUTABLE UI STATE ===
var S = {
  purchasePrice: Math.round((CONFIG.budgetMin + CONFIG.budgetMax) / 2),
  downPaymentPct: 20,
  mortgageRate: 6.5,
  taxRate: 0.65,
  kitchenEnabled: false, kitchenCost: 30000,
  flooringEnabled: false, flooringCost: 12000,
  paintEnabled: false, paintCost: 8000,
  landscapeEnabled: false, landscapeCost: 15000,
  sec_purchase: true,
  sec_upgrades: false,
  sec_neighborhoods: true,
  sec_schools: true,
  sec_timeline: true
};

// === RENDER ===
function render() {
  var agent = AGENTS[AGENT_KEY];
  var c = calc();
  var now = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  // Header
  document.getElementById('pageTitle').textContent = 'Buyer Dashboard \u2014 ' + CONFIG.clientNames + ' | Live AZ Co';
  document.getElementById('headerTitle').textContent = 'Your Home Search Dashboard';
  document.getElementById('headerNames').textContent = CONFIG.clientNames;
  document.getElementById('headerSub').textContent = CONFIG.targetAreas + ' \u2022 ' + fmt(CONFIG.budgetMin) + '\u2013' + fmt(CONFIG.budgetMax) + ' \u2022 ' + CONFIG.bedsMin + '+ BD / ' + CONFIG.bathsMin + '+ BA';
  document.getElementById('footerAgent').textContent = 'Prepared by ' + agent.displayName + ' \u2022 ' + agent.members[0].phone;

  // =========================================
  // TAB 1: HOME SEARCH
  // =========================================
  var t1 = '';

  // Search criteria hero
  t1 += '<div style="background:linear-gradient(135deg,var(--sand-pale),rgba(212,165,116,.08));border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px">';
