<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title id="pageTitle">Your Home Review | Live AZ Co</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--sand:#D4A574;--sand-light:#E8CDB0;--sand-pale:#F5EDE3;
--terra:#C2703E;--terra-light:#D4915F;--terra-dark:#A85A2A;
--sage:#7A8B6F;--sage-dark:#5C6B52;--sage-light:#9AAD8E;
--slate:#3D3D3D;--slate-light:#5A5A5A;
--cream:#FAF6F0;
--positive:#5C8A4D;--negative:#B84C3A;--neutral:#8B7355;
--card:#fff;--border:#E8DDD0;
--sage-bg:rgba(122,139,111,.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--slate);-webkit-font-smoothing:antialiased}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--sand-pale);outline:none;margin:6px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--terra);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--terra);cursor:pointer;border:2px solid #fff}
input[type=number]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:14px;font-weight:700;color:var(--slate);background:var(--card);outline:none}
input[type=number]:focus{border-color:var(--terra)}
.header{background:linear-gradient(135deg,var(--slate),var(--slate-light));padding:16px 20px;color:#fff}
.header-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.header-text{flex:1;min-width:0}
.header-logo{height:72px;width:auto;opacity:.9;flex-shrink:0;margin-left:-12px}
.header-title{font-size:18px;font-weight:700;font-family:'Playfair Display',serif;line-height:1.2;opacity:.85}
.header-names{font-size:28px;font-weight:900;font-family:'Playfair Display',serif;margin-top:4px}
.tab-bar-wrap{position:sticky;top:0;z-index:100;background:var(--card)}
.tab-bar{display:flex;border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1 0 0;padding:14px 8px;text-align:center;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:var(--slate-light);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;white-space:nowrap}
.tab-btn.active{color:var(--terra);border-bottom-color:var(--terra);background:var(--sand-pale)}
.tab-btn:hover:not(.active){background:rgba(0,0,0,.02)}
.tab-panel{display:none;max-width:1400px;margin:0 auto;padding:12px}
.tab-panel.active{display:block}
.metrics{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:10px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-label{font-size:10px;font-weight:600;color:var(--slate-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:800;line-height:1.1}
.metric-sub{font-size:11px;color:var(--neutral);margin-top:4px}
.layout{display:flex;flex-direction:column;gap:14px}
.sidebar{width:100%}.main{width:100%}
.section{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.section-header{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.section-header:hover{background:var(--sand-pale)}
.section-title{font-size:14px;font-weight:700;color:var(--slate)}
.section-arrow{font-size:12px;color:var(--neutral);transition:transform .2s}
.section-body{padding:0 16px 16px;display:none}
.section.open .section-body{display:block}
.section.open .section-arrow{transform:rotate(180deg)}
.field{margin-bottom:12px}
.field-label{font-size:11px;font-weight:600;color:var(--slate-light);margin-bottom:4px;display:flex;justify-content:space-between}
.field-value{font-size:13px;font-weight:700;color:var(--terra)}
.info-box{background:var(--sand-pale);border-radius:6px;padding:10px 12px;text-align:center;margin-bottom:10px}
.info-box .big{font-size:20px;font-weight:800;color:var(--terra)}
.info-box .note{font-size:10px;color:var(--neutral);font-style:italic;margin-top:2px}
.toggle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.toggle-label{font-size:13px;font-weight:600;color:var(--slate)}
.toggle{position:relative;width:44px;height:24px;background:var(--sand-pale);border-radius:12px;cursor:pointer;transition:.2s;border:1px solid var(--border)}
.toggle.on{background:var(--sage)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:22px}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--sand-pale)}
.summary-label{font-size:13px;color:var(--slate-light)}
.summary-value{font-size:14px;font-weight:700}
.summary-total{display:flex;justify-content:space-between;padding:10px 12px;border-radius:8px;margin-top:6px}
.comp-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.comp-table th{padding:6px 4px;font-weight:600;color:var(--slate-light);font-size:10px;text-transform:uppercase;letter-spacing:.3px;text-align:left;border-bottom:2px solid var(--border)}
.comp-table td{padding:6px 4px;border-bottom:1px solid var(--sand-pale);vertical-align:top}
.comp-highlight{color:var(--positive);font-weight:600}
.comp-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.comp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px}
.comp-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.comp-card-addr{font-weight:700;font-size:13px;color:var(--slate)}
.comp-card-sub{font-size:11px;color:var(--slate-light);margin-top:2px}
.comm-badge{display:inline-block;font-size:9px;background:var(--sage);color:#fff;padding:1px 6px;border-radius:3px;margin-left:4px;font-weight:600;letter-spacing:.3px;vertical-align:middle}
.tier-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px;white-space:nowrap;flex-shrink:0}
.tier-badge.strong{background:rgba(92,138,77,.12);color:var(--positive)}
.tier-badge.moderate{background:rgba(212,168,71,.12);color:#B8860B}
.tier-badge.weak{background:rgba(184,76,58,.1);color:var(--negative)}
.score-row{display:flex;align-items:center;gap:8px}
.score-label{font-size:10px;color:var(--slate-light);text-transform:uppercase;letter-spacing:.3px;font-weight:600;white-space:nowrap}
.score-bar{flex:1;height:6px;background:var(--sand-pale);border-radius:3px;overflow:hidden}
.score-fill{height:100%;background:var(--sage);border-radius:3px;transition:width .3s}
.score-val{font-size:12px;font-weight:700;color:var(--sage-dark);min-width:20px;text-align:right}
.comp-details{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.comp-detail{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--sand-pale)}
.cd-label{font-size:10px;color:var(--slate-light);text-transform:uppercase;letter-spacing:.3px}
.cd-val{font-size:12px;font-weight:600;color:var(--slate)}
.comp-adj-section{border-top:1px solid var(--border);padding-top:8px}
.comp-adj-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--slate-light);margin-bottom:6px}
.comp-adj-none{font-size:11px;color:var(--positive);font-style:italic}
.comp-adj-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.comp-adj-row span:first-child{color:var(--slate-light)}
.comp-adj-amt{font-weight:600;color:var(--positive)}
.comp-card-footer{display:flex;justify-content:space-between;border-top:1px solid var(--border);padding-top:8px;margin-top:auto}
.comp-sold{font-size:12px;font-weight:600;color:var(--slate)}
.comp-adjusted{font-size:12px;font-weight:700;color:var(--terra)}
@media(max-width:768px){.comp-card-grid{grid-template-columns:1fr}}
.adj-legend{background:linear-gradient(135deg,rgba(194,112,62,.05),transparent);border-left:3px solid var(--terra);padding:14px 18px;border-radius:0 8px 8px 0;margin-bottom:14px}
.adj-legend-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--slate);margin-bottom:6px}
.adj-legend-intro{font-size:12px;color:var(--neutral);line-height:1.7;margin:0 0 10px}
.adj-legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.adj-legend-item{display:flex;gap:8px;align-items:baseline}
.adj-legend-label{font-size:11px;font-weight:700;color:var(--terra);white-space:nowrap;min-width:65px}
.adj-legend-desc{font-size:11px;color:var(--neutral);line-height:1.5}
@media(max-width:768px){.adj-legend-grid{grid-template-columns:1fr}}
.callout{border-radius:8px;padding:12px;margin-bottom:12px}
.callout.amber{background:rgba(212,168,71,.08);border:1px solid rgba(212,168,71,.2)}
.callout.green{background:rgba(92,138,77,.06);border:1px solid rgba(92,138,77,.15)}
.callout.blue{background:rgba(61,61,61,.04);border:1px solid rgba(61,61,61,.12)}
.callout-title{font-weight:700;font-size:12px;color:var(--slate);margin-bottom:4px}
.callout-text{font-size:12px;color:var(--neutral);line-height:1.6}
.email-btn{display:inline-block;background:var(--terra);color:#fff;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;font-family:inherit;border:none;cursor:pointer}
.email-btn:hover{background:var(--terra-dark)}
.review-card{background:var(--sand-pale);border-radius:10px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.review-text{font-size:13px;color:var(--slate);line-height:1.6;font-style:italic}
.review-author{font-size:11px;font-weight:700;color:var(--neutral);margin-top:8px}
.team-stat{text-align:center;padding:16px 10px}
.team-stat-val{font-size:28px;font-weight:900;font-family:'Playfair Display',serif;color:var(--terra)}
.team-stat-lbl{font-size:11px;font-weight:600;color:var(--slate-light);margin-top:2px}
.footer{text-align:center;font-size:11px;color:var(--neutral);line-height:1.5;margin-top:20px;padding:20px}
.footer-logo{height:32px;width:auto;opacity:.7;margin-bottom:8px}
.prop-card{background:var(--sand-pale);border-radius:10px;padding:14px;border:1px solid var(--border);margin-bottom:12px}
.prop-title{font-size:14px;font-weight:800;color:var(--slate);margin-bottom:2px}
.prop-addr{font-size:12px;color:var(--terra);font-weight:600}
.prop-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.prop-stat{background:var(--card);border-radius:8px;padding:10px;text-align:center}
.prop-stat-label{font-size:10px;color:var(--slate-light);text-transform:uppercase;font-weight:600}
.prop-stat-value{font-size:18px;font-weight:800}
@media(min-width:768px){
  .header-names{font-size:32px}
  .metrics{grid-template-columns:repeat(3,1fr)}
  .layout{flex-direction:row}
  .sidebar{width:380px;flex-shrink:0}
  .main{flex:1;min-width:0}
  .tab-btn{font-size:13px;padding:14px 16px}
}
@media(max-width:600px){
  .tab-btn{font-size:11px;padding:12px 6px}
}
.cromford-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:768px){.cromford-grid{grid-template-columns:repeat(5,1fr)}}

/* Hero area for Your Home tab */
.home-hero{background:linear-gradient(135deg,var(--sand-pale),rgba(212,165,116,.08));border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:16px}
.home-hero-address{font-size:24px;font-weight:800;font-family:'Playfair Display',serif;color:var(--slate)}
.home-hero-sub{font-size:13px;color:var(--neutral);margin-top:4px;margin-bottom:20px}
.home-hero-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.home-hero-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.home-hero-stat .label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--slate-light);font-weight:600;margin-bottom:4px}
.home-hero-stat .value{font-size:20px;font-weight:800;color:var(--terra)}
.home-hero-stat .detail{font-size:10px;color:var(--neutral);margin-top:2px}

/* Narrative callout */
.narrative-box{background:linear-gradient(135deg,rgba(194,112,62,.05),transparent);border-left:3px solid var(--terra);padding:16px 20px;border-radius:0 8px 8px 0;margin-bottom:16px;font-size:13px;line-height:1.8;color:var(--neutral)}
.narrative-box strong{color:var(--slate)}

/* Feature stars */
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.feature-item{display:flex;gap:10px;align-items:flex-start;font-size:12px}
.feature-star{color:var(--terra);font-size:16px;flex-shrink:0}

/* Equity bars */
.eq-bar{height:24px;background:var(--sand-pale);border-radius:12px;overflow:hidden;margin:6px 0}
.eq-fill{height:100%;background:linear-gradient(90deg,var(--terra-dark),var(--terra-light));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;min-width:60px}

/* Timeline */
.timeline{position:relative;padding:20px 0 20px 30px;border-left:2px solid var(--terra);margin-left:10px}
.timeline-item{margin-bottom:24px;position:relative}
.timeline-dot{position:absolute;left:-39px;top:2px;width:16px;height:16px;border-radius:50%;border:3px solid var(--cream)}

/* Value hero display */
.value-display{text-align:center;padding:24px 20px;background:linear-gradient(135deg,rgba(194,112,62,.08),rgba(194,112,62,.02));border:2px solid var(--terra);border-radius:10px;margin-bottom:16px}
.value-display .big{font-size:42px;font-weight:900;font-family:'Playfair Display',serif;color:var(--terra)}
.value-display .range{font-size:13px;color:var(--neutral);margin-top:4px}

/* Sub-tab pill bar */
.sub-tab-bar{display:flex;gap:4px;background:var(--slate);border-radius:10px;padding:4px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sub-tab-bar::-webkit-scrollbar{display:none}
.sub-tab-btn{flex:1 0 auto;padding:10px 16px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:rgba(255,255,255,.6);background:transparent;cursor:pointer;white-space:nowrap;transition:.2s}
.sub-tab-btn.active{background:var(--terra);color:#fff}
.sub-tab-btn:hover:not(.active){color:rgba(255,255,255,.85)}
.sub-panel{display:none}
.sub-panel.active{display:block}

@media(max-width:600px){
  .feature-grid{grid-template-columns:1fr}
  .value-display .big{font-size:32px}
  .home-hero-address{font-size:20px}
  .eq-invest-grid{grid-template-columns:1fr !important}
  .sub-tab-btn{font-size:11px;padding:8px 10px}
}
</style>
</head>

function showTab(id){
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});

  event.target.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
function toggleSection(key){S['sec_'+key]=!S['sec_'+key];render();}
function showSubTab(id){
  S.activeSubTab=id;

function numInput(label,key,min,max,note){

      { text: "I have had the privilege of working with Josh, Jacqui, and the entire Live AZ Collective team not just once, but twice, and both experiences were outstanding!", author: "Ron Kelleher (Repeat Client)" },

(function() {

      var glaAdj = Math.round(sfDiff * glaRate / 500) * 500;
      adjs.push({ label: "GLA", amount: glaAdj });
    }
    var bathDiff = SUBJECT.baths - parseFloat(c.baths);
    if (bathDiff !== 0) {
      var bathAdj = Math.round(bathDiff * 2) * 5000;
      adjs.push({ label: "Bathrooms", amount: bathAdj });
    }
    if (SUBJECT.pool === "Y" && c.pool !== "Y") {
      adjs.push({ label: "Pool", amount: 20000 });
    } else if (SUBJECT.pool !== "Y" && c.pool === "Y") {
      adjs.push({ label: "Pool", amount: -20000 });
    }
    c.adjustments = adjs;
    c.adjustedPrice = c.sp;
    for (var j = 0; j < adjs.length; j++) c.adjustedPrice += adjs[j].amount;
  }
})();
